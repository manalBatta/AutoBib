<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoBib</title>
    <style>
      :root {
        --blue-900: #1e3a8a;
        --blue-700: #1d4ed8;
        --blue-600: #2563eb;
        --blue-500: #3b82f6;
        --blue-100: #dbeafe;
        --blue-50: #eff6ff;
        --gray-50: #f8fafc;
        --gray-200: #e2e8f0;
        --gray-500: #64748b;
        --gray-700: #334155;
        --gray-900: #0f172a;
        --red-50: #fef2f2;
        --red-600: #dc2626;
        --radius: 12px;
        --shadow: 0 10px 40px rgba(30, 58, 138, 0.12);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: linear-gradient(
          160deg,
          var(--blue-50) 0%,
          var(--gray-50) 50%,
          #fff 100%
        );
        color: var(--gray-900);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 520px;
        background: #fff;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 40px 36px;
        border: 1px solid var(--gray-200);
      }

      .logo {
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, var(--blue-700), var(--blue-500));
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
      }

      .logo svg {
        width: 26px;
        height: 26px;
        fill: #fff;
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--blue-900);
        letter-spacing: -0.02em;
      }

      .subtitle {
        margin-top: 8px;
        color: var(--gray-500);
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .dropzone {
        margin-top: 28px;
        border: 2px dashed var(--blue-500);
        border-radius: var(--radius);
        background: var(--blue-50);
        padding: 32px 20px;
        text-align: center;
        cursor: pointer;
        transition:
          background 0.2s,
          border-color 0.2s;
        display: block;
      }

      .dropzone:hover,
      .dropzone.dragover {
        background: var(--blue-100);
        border-color: var(--blue-700);
      }

      .dropzone.has-file {
        border-style: solid;
        background: #fff;
      }

      .dropzone p {
        color: var(--gray-700);
        font-size: 0.9rem;
      }

      .dropzone .filename {
        margin-top: 8px;
        font-weight: 600;
        color: var(--blue-700);
        word-break: break-all;
      }

      .dropzone input {
        display: none;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        margin-top: 16px;
        padding: 14px 20px;
        font-size: 1rem;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition:
          background 0.2s,
          opacity 0.2s;
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--blue-700);
        color: #fff;
      }

      .btn-primary:hover:not(:disabled) {
        background: var(--blue-900);
      }

      .btn-secondary {
        background: var(--blue-50);
        color: var(--blue-700);
        border: 1px solid var(--blue-100);
      }

      .btn-secondary:hover:not(:disabled) {
        background: var(--blue-100);
      }

      .downloads {
        display: none;
        flex-direction: column;
        gap: 10px;
        margin-top: 8px;
      }

      .downloads.visible {
        display: flex;
      }

      .status {
        margin-top: 20px;
        padding: 14px 16px;
        border-radius: 8px;
        font-size: 0.9rem;
        line-height: 1.5;
        display: none;
      }

      .status.visible {
        display: block;
      }

      .status.loading {
        background: var(--blue-50);
        color: var(--blue-900);
        border: 1px solid var(--blue-100);
      }

      .status.success {
        background: #f0fdf4;
        color: #166534;
        border: 1px solid #bbf7d0;
      }

      .status.error {
        background: var(--red-50);
        color: var(--red-600);
        border: 1px solid #fecaca;
      }

      .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid var(--blue-100);
        border-top-color: var(--blue-700);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 8px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M6 4h12a2 2 0 0 1 2 2v14l-4-3-4 3-4-3-4 3V6a2 2 0 0 1 2-2z"
          />
        </svg>
      </div>
      <h1>AutoBib</h1>
      <p class="subtitle">
        Upload a LaTeX file with URLs. Get an updated .tex with citations and a
        matching .bib file.
      </p>

      <label class="dropzone" id="dropzone" for="fileInput">
        <p>Drag & drop your <strong>.tex</strong> file here</p>
        <p>or click to browse</p>
        <p class="filename" id="fileName" hidden></p>
        <input type="file" id="fileInput" accept=".tex" />
      </label>

      <button type="button" class="btn btn-primary" id="processBtn" disabled>
        Process
      </button>

      <div id="status" class="status" role="status"></div>

      <div class="downloads" id="downloads">
        <button type="button" class="btn btn-secondary" id="downloadTex">
          Download updated .tex
        </button>
        <button type="button" class="btn btn-secondary" id="downloadBib">
          Download .bib
        </button>
      </div>
    </main>

    <script>
      const dropzone = document.getElementById("dropzone");
      const fileInput = document.getElementById("fileInput");
      const fileNameEl = document.getElementById("fileName");
      const processBtn = document.getElementById("processBtn");
      const statusEl = document.getElementById("status");
      const downloadsEl = document.getElementById("downloads");
      const downloadTexBtn = document.getElementById("downloadTex");
      const downloadBibBtn = document.getElementById("downloadBib");

      let selectedFile = null;
      let resultData = null;

      function setStatus(type, message) {
        statusEl.className = "status visible " + type;
        statusEl.innerHTML = message;
      }

      function clearStatus() {
        statusEl.className = "status";
        statusEl.textContent = "";
      }

      function setFile(file) {
        if (!file || !file.name.toLowerCase().endsWith(".tex")) {
          setStatus("error", "Please select a .tex file.");
          return;
        }
        selectedFile = file;
        fileNameEl.textContent = file.name;
        fileNameEl.hidden = false;
        dropzone.classList.add("has-file");
        processBtn.disabled = false;
        downloadsEl.classList.remove("visible");
        resultData = null;
        clearStatus();
      }

      function baseName(filename) {
        const i = filename.lastIndexOf(".");
        return i > 0 ? filename.slice(0, i) : filename;
      }

      function downloadBlob(content, filename, mime) {
        const blob = new Blob([content], { type: mime });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      }

      dropzone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropzone.classList.add("dragover");
      });

      dropzone.addEventListener("dragleave", () => {
        dropzone.classList.remove("dragover");
      });

      dropzone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropzone.classList.remove("dragover");
        const file = e.dataTransfer.files[0];
        if (file) setFile(file);
      });

      fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        if (file) setFile(file);
      });

      processBtn.addEventListener("click", async () => {
        if (!selectedFile) return;

        processBtn.disabled = true;
        downloadsEl.classList.remove("visible");
        setStatus(
          "loading",
          '<span class="spinner"></span>Fetching citations… this may take a few minutes.',
        );

        const formData = new FormData();
        formData.append("file", selectedFile);

        try {
          const response = await fetch("/api/process", {
            method: "POST",
            body: formData,
          });

          const data = await response.json().catch(() => ({}));

          if (!response.ok) {
            const detail = data.detail;
            const message = Array.isArray(detail)
              ? detail.map((d) => d.msg || String(d)).join(", ")
              : detail || "Processing failed. Please try again.";
            throw new Error(message);
          }

          resultData = data;
          const stats = data.stats;
          const base = baseName(data.original_filename || selectedFile.name);

          if (!data.edited_tex && !data.bib) {
            throw new Error(
              "Server returned empty results. Try again or set USE_MOCK=true in .env.",
            );
          }

          if (stats.success === 0) {
            throw new Error(
              `No citations could be extracted from ${stats.urls_found} URLs. ` +
                "Check terminal logs, your API keys, or set USE_MOCK=true in .env.",
            );
          }

          setStatus(
            "success",
            `Done in ${stats.elapsed_seconds}s — ${stats.success} of ${stats.urls_found} citations extracted` +
              (stats.failed ? ` (${stats.failed} failed)` : "") +
              ".",
          );

          downloadsEl.classList.add("visible");

          downloadTexBtn.onclick = () => {
            downloadBlob(
              data.edited_tex,
              base + "_updated.tex",
              "application/x-tex",
            );
          };

          downloadBibBtn.onclick = () => {
            downloadBlob(data.bib, base + ".bib", "application/x-bibtex");
          };
        } catch (err) {
          setStatus("error", err.message || "Something went wrong.");
        } finally {
          processBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
